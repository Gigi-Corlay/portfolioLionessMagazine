{% load static %}
{% load i18n %}
<style>
   /* ==========================================================================
    LANGUES
   ========================================================================== */
.select-language {
    position: relative;
    display: inline-block;
}


.current-language {
    color:  #04757D;
    font-weight: bold;
    cursor: pointer;
}


.style-arrow {
    color:  #04757D;
    font-size: 12px;
}


.language-options {
    display: none;
    position: absolute;
    top: 25px;
    right: 0;

    background: #04757D;
    border-radius: 6px;
    overflow: hidden;
    min-width: 60px;
}


/* ouverture au survol */
.select-language:hover .language-options {
    display: block;
}
</style>
<header class="bg-white shadow-sm sticky-top">

    <!-- Top Bar -->
    <div class="container-fluid px-3 px-md-5 py-2 py-md-3">
        <div class="row align-items-center gy-2">

            <!-- Left -->
            <div class="col-12 col-md-4 d-flex align-items-center gap-2 gap-sm-3 justify-content-center justify-content-md-start">
                <div class="header-right">
                    <form action="{% url 'set_language' %}" method="post" class="lang-form lang-selector-custom">
                        {% csrf_token %}
                        <input name="next" type="hidden" value="{{ request.path }}">
                
                        <div class="select-language">
                            <div class="current-language">
                                {{ request.LANGUAGE_CODE|upper }}
                                <i class="fa-solid fa-chevron-down ms-1 style-arrow"></i>
                            </div>
                
                            <div class="language-options">
                                <button type="submit" name="language" value="fr">FR</button>
                                <button type="submit" name="language" value="en">EN</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Center -->
            <div class="col-12 col-md-4 text-center order-first order-md-0">

                <a href="{% url 'home' %}">

                    <img src="{% static 'images/logo-lioness.png' %}"
                        alt="LIONESS Logo"
                        height="40"
                        class="header-logo">

                </a>

            </div>

            <!-- Right -->
            <div class="col-12 col-md-4 d-flex justify-content-center justify-content-md-end gap-2">

                <a href="{% url 'accounts:login' %}"
                    class="btn btn-login-custom rounded-pill px-4 text-white btn-sm fw-medium">

                    {% trans "Log in" %}

                </a>

                <a href="{% url 'accounts:register' %}"
                    class="btn btn-green-custom rounded-pill px-4 text-white btn-sm fw-medium">

                    {% trans "Become a member" %}

                </a>

            </div>

        </div>
    </div>

    </nav>

</header>
