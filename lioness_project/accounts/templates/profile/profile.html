{% load static %}
{% load i18n %}

<link rel="icon" type="image/png" href="{% static 'images/logo_favicon.png' %}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<link rel="stylesheet" href="{% static 'accounts/profile.css' %}">

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-9 col-md-11">
            <div class="card shadow border-0">

                <!-- Header -->
                <div class="card-header bg-primary text-white py-4 position-relative">
                    <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                    
                        <div class="d-flex align-items-center">

                            {% if profile.profile_picture %}
                                <img
                                    src="{{ profile.profile_picture.url }}"
                                    alt="Profile Picture"
                                    class="photo-circle rounded-circle img-thumbnail me-4">
                            {% else %}
                                <img
                                    src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23cccccc'/><circle cx='50' cy='38' r='18' fill='%23ffffff'/><path d='M20 85 Q50 55 80 85 Z' fill='%23ffffff'/></svg>"
                                    alt="Default Profile Picture"
                                    class="photo-circle rounded-circle img-thumbnail me-4">
                            {% endif %}
                        
                            <div>
                                <h2 class="mb-1 text-white">
                                    {% trans "Profile of" %} {{ user.get_full_name|default:user.username }}
                                </h2>
                            </div>
                        
                        </div>

                        <!-- Sélecteur de Langue -->
                        <div class="header-right">
                            <form action="{% url 'set_language' %}" method="post" class="lang-form mb-0">
                                {% csrf_token %}
                                <input name="next" type="hidden" value="{{ request.path }}">
                        
                                <div class="select-language">
                                    <div class="current-language">
                                        {{ request.LANGUAGE_CODE|upper }}
                                        <i class="bi bi-chevron-down ms-1 style-arrow"></i>
                                    </div>
                        
                                    <div class="language-options">
                                        <button class="lang-btn" type="submit" name="language" value="fr">FR</button>
                                        <button class="lang-btn" type="submit" name="language" value="en">EN</button>
                                    </div>
                                </div>
                            </form>
                        </div>

                    </div>
                </div>

                <!-- Body -->
                <div
