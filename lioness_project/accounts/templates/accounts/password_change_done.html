{% load static %}
<link rel="icon" type="image/png" href="{% static 'images/logo_favicon.png' %}">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{% static 'accounts/profile.css' %}">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow border-0 text-center">

                <div class="card-body p-5">

                    <i class="bi bi-check-circle-fill" style="font-size:3rem; color: var(--lioness-color);"></i>

                    <h3 class="mt-3" style="font-family: var(--title-font); color: var(--lioness-color);">
                        Password Updated
                    </h3>

                    <p class="text-muted">
                        Your password has been changed successfully.
                    </p>

                    <a href="{% url 'accounts:profile' %}" class="btn btn-success btn-lg mt-3">
                        Back to Profile
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>
