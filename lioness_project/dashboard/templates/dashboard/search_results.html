{% extends "dashboard/dashboard.html" %}

{% block content %}

<h2>Search Results</h2>

<p>
    Search: <strong>{{ query }}</strong>
</p>

{% if results %}

<ul>
    {% for article in results %}
    <li>
        <a href="{% url 'blog_magazine:article_detail' article.id %}">
            {{ article.title }}
        </a>
        ({{ article.category }})
    </li>
    {% endfor %}
</ul>

{% else %}

<p>No article found.</p>

{% endif %}

{% endblock %}
